name: Refresh and deploy validated SITREP

on:
  schedule:
    - cron: "*/30 * * * *"
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  refresh-build-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 11.7.0
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - name: Refresh and validate public reporting
        run: python3 scripts/refresh_data.py
      - name: Install and build
        run: |
          pnpm install --frozen-lockfile
          pnpm build
      - name: Commit validated data changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/sitrep.json public/sitrep.json public/version.json public/validation-status.json
          git diff --cached --quiet || git commit -m "data: refresh validated public reporting"
          git push
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist
      - name: Deploy GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
